<!DOCTYPE html>
<html>
<head>
<title>Student Result System</title>

</head>


<body>

<div class="container">

<h2>Student Result System</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="number" id="roll" placeholder="Roll Number"><br>
<input type="number" id="math" placeholder="Math Marks"><br>
<input type="number" id="science" placeholder="Science Marks"><br>
<input type="number" id="english" placeholder="English Marks"><br>

<button onclick="addStudent()">Add Student</button>
<button onclick="displayStudents()">Display All Students</button>
<button onclick="showToppers()">Average Above 80</button>
<button onclick="showFailed()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>

<div id="output"></div>

</div>


<script src="/FSD_2ndsem_CSE12_Farhaad/Assesment1/script.js"></script>
